name: Feature Request
description: Suggest an enhancement for the project
title: "[FEATURE] "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: "## Feature Request"

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed solution.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've thought about?

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Core (knowledge base, schema)
        - Tools (CLI, analyzers)
        - Documentation
        - AI/Datasets
        - Testing/Runners
        - CI/Infrastructure
        - Website/UI
        - Other
